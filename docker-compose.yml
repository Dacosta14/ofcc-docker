version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: oficina-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: oficina
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./ofcc/banco:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./ofcc/backend
    container_name: oficina-backend
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: oficina

  frontend:
    build: ./ofcc-front
    container_name: oficina-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql-data:
